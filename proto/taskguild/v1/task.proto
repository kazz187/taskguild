syntax = "proto3";

package taskguild.v1;

import "google/protobuf/timestamp.proto";
import "taskguild/v1/common.proto";

enum TaskAssignmentStatus {
  TASK_ASSIGNMENT_STATUS_UNSPECIFIED = 0;
  TASK_ASSIGNMENT_STATUS_UNASSIGNED = 1;
  TASK_ASSIGNMENT_STATUS_PENDING = 2;
  TASK_ASSIGNMENT_STATUS_ASSIGNED = 3;
}

service TaskService {
  rpc CreateTask(CreateTaskRequest) returns (CreateTaskResponse);
  rpc GetTask(GetTaskRequest) returns (GetTaskResponse);
  rpc ListTasks(ListTasksRequest) returns (ListTasksResponse);
  rpc UpdateTask(UpdateTaskRequest) returns (UpdateTaskResponse);
  rpc DeleteTask(DeleteTaskRequest) returns (DeleteTaskResponse);
  rpc UpdateTaskStatus(UpdateTaskStatusRequest) returns (UpdateTaskStatusResponse);

  // Task lifecycle control
  rpc StopTask(StopTaskRequest) returns (StopTaskResponse);
  rpc ResumeTask(ResumeTaskRequest) returns (ResumeTaskResponse);

  // Archive operations
  rpc ArchiveTask(ArchiveTaskRequest) returns (ArchiveTaskResponse);
  rpc ArchiveTerminalTasks(ArchiveTerminalTasksRequest) returns (ArchiveTerminalTasksResponse);
  rpc UnarchiveTask(UnarchiveTaskRequest) returns (UnarchiveTaskResponse);
  rpc ListArchivedTasks(ListArchivedTasksRequest) returns (ListArchivedTasksResponse);

  // Task image operations
  rpc UploadTaskImage(UploadTaskImageRequest) returns (UploadTaskImageResponse);
  rpc GetTaskImage(GetTaskImageRequest) returns (GetTaskImageResponse);
  rpc ListTaskImages(ListTaskImagesRequest) returns (ListTaskImagesResponse);
  rpc DeleteTaskImage(DeleteTaskImageRequest) returns (DeleteTaskImageResponse);
}

message Task {
  // identity
  string id = 1;
  string project_id = 2;
  string workflow_id = 3;

  // content
  string title = 4;
  string description = 5;

  // status & assignment
  string status_id = 6;                         // current workflow status ID
  TaskAssignmentStatus assignment_status = 7;
  string assigned_agent_id = 8;                  // agent currently working on this

  // execution options
  bool use_worktree = 9;
  reserved 10; // was permission_mode, now on WorkflowStatus
  reserved "permission_mode";

  // metadata
  map<string, string> metadata = 11;
  google.protobuf.Timestamp created_at = 12;
  google.protobuf.Timestamp updated_at = 13;

  // overrides WorkflowStatus.effort when non-empty.
  // Valid values: "low", "medium", "high", "max".
  string effort = 14;
}

message CreateTaskRequest {
  // identity
  string project_id = 1;
  string workflow_id = 2;

  // content
  string title = 3;
  string description = 4;

  // execution options
  bool use_worktree = 5;
  reserved 6; // was permission_mode, now on WorkflowStatus
  reserved "permission_mode";

  // metadata
  map<string, string> metadata = 7;

  // optional: specify initial status (defaults to workflow's IsInitial status)
  optional string status_id = 8;

  // overrides WorkflowStatus.effort when non-empty.
  // Valid values: "low", "medium", "high", "max".
  string effort = 9;
}
message CreateTaskResponse {
  Task task = 1;
}

message GetTaskRequest {
  string id = 1;
}
message GetTaskResponse {
  Task task = 1;
}

message ListTasksRequest {
  // filters
  string project_id = 1;
  string workflow_id = 2;
  string status_id = 3;

  PaginationRequest pagination = 4;
}
message ListTasksResponse {
  repeated Task tasks = 1;
  PaginationResponse pagination = 2;
}

message UpdateTaskRequest {
  string id = 1;

  // content
  string title = 2;
  string description = 3;

  // execution options
  optional bool use_worktree = 4;
  reserved 5; // was permission_mode, now on WorkflowStatus
  reserved "permission_mode";

  // metadata
  map<string, string> metadata = 6;

  // optional override of WorkflowStatus.effort.
  // Empty string explicitly clears the override (falls back to WorkflowStatus).
  // Valid non-empty values: "low", "medium", "high", "max".
  optional string effort = 7;
}
message UpdateTaskResponse {
  Task task = 1;
}

message DeleteTaskRequest {
  string id = 1;
}
message DeleteTaskResponse {}

message UpdateTaskStatusRequest {
  string id = 1;
  string status_id = 2;
  // When true, bypass workflow transition validation (force move).
  // Still blocked if an agent is currently running on the task.
  bool force = 3;
}
message UpdateTaskStatusResponse {
  Task task = 1;
}

// Task lifecycle control

message StopTaskRequest {
  string id = 1;
}
message StopTaskResponse {
  Task task = 1;
}

message ResumeTaskRequest {
  string id = 1;
}
message ResumeTaskResponse {
  Task task = 1;
}

// Archive operations

message ArchiveTaskRequest {
  string id = 1;
}
message ArchiveTaskResponse {
  Task task = 1;
}

message ArchiveTerminalTasksRequest {
  string project_id = 1;
  string workflow_id = 2;
}
message ArchiveTerminalTasksResponse {
  repeated Task archived_tasks = 1;   // tasks that were archived
  repeated Task skipped_tasks = 2;    // tasks skipped (e.g. agent running)
}

message UnarchiveTaskRequest {
  string id = 1;
}
message UnarchiveTaskResponse {
  Task task = 1;
}

message ListArchivedTasksRequest {
  string project_id = 1;
  string workflow_id = 2;
  PaginationRequest pagination = 3;
}
message ListArchivedTasksResponse {
  repeated Task tasks = 1;
  PaginationResponse pagination = 2;
}

// Task image operations

message TaskImage {
  string id = 1;
  string filename = 2;
  string media_type = 3;
  int64 size_bytes = 4;
  google.protobuf.Timestamp created_at = 5;
}

message UploadTaskImageRequest {
  string task_id = 1;
  string filename = 2;
  string media_type = 3;
  bytes data = 4;
}
message UploadTaskImageResponse {
  TaskImage image = 1;
}

message GetTaskImageRequest {
  string task_id = 1;
  string image_id = 2;
}
message GetTaskImageResponse {
  TaskImage image = 1;
  bytes data = 2;
}

message ListTaskImagesRequest {
  string task_id = 1;
}
message ListTaskImagesResponse {
  repeated TaskImage images = 1;
}

message DeleteTaskImageRequest {
  string task_id = 1;
  string image_id = 2;
}
message DeleteTaskImageResponse {}
