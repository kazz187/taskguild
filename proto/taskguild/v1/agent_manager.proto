syntax = "proto3";

package taskguild.v1;

import "google/protobuf/timestamp.proto";
import "taskguild/v1/agent.proto";
import "taskguild/v1/interaction.proto";
import "taskguild/v1/permission.proto";
import "taskguild/v1/script.proto";
import "taskguild/v1/single_command_permission.proto";
import "taskguild/v1/skill.proto";
import "taskguild/v1/task_log.proto";

// AgentManagerService is the bidirectional communication channel between
// the backend and agent-manager instances.
service AgentManagerService {
  // Subscribe opens a server-stream for receiving commands from the backend.
  rpc Subscribe(AgentManagerSubscribeRequest) returns (stream AgentCommand);
  // ClaimTask allows an agent-manager to claim an available task.
  rpc ClaimTask(ClaimTaskRequest) returns (ClaimTaskResponse);
  // ReportTaskResult reports the outcome of a task execution.
  rpc ReportTaskResult(ReportTaskResultRequest) returns (ReportTaskResultResponse);
  // ReportAgentStatus reports the current status of an agent.
  rpc ReportAgentStatus(ReportAgentStatusRequest) returns (ReportAgentStatusResponse);
  // Heartbeat sends periodic health signals from the agent-manager.
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);
  // CreateInteraction creates a new interaction request from an agent.
  rpc CreateInteraction(CreateInteractionRequest) returns (CreateInteractionResponse);
  // GetInteractionResponse polls for a user's response to an interaction.
  rpc GetInteractionResponse(GetInteractionResponseRequest) returns (GetInteractionResponseResponse);
  // SyncAgents returns all agent definitions for a project so the agent can
  // write them as .claude/agents/*.md files locally.
  rpc SyncAgents(SyncAgentsRequest) returns (SyncAgentsResponse);
  // ReportTaskLog reports a structured log entry from an agent during task execution.
  rpc ReportTaskLog(ReportTaskLogRequest) returns (ReportTaskLogResponse);
  // SyncPermissions merges local .claude/settings.json permissions with the
  // backend's stored permissions (union strategy) and returns the merged result.
  rpc SyncPermissions(SyncPermissionsRequest) returns (SyncPermissionsResponse);
  // ReportWorktreeList reports available worktrees from the agent-manager's filesystem.
  rpc ReportWorktreeList(ReportWorktreeListRequest) returns (ReportWorktreeListResponse);
  // RequestWorktreeList triggers a worktree scan on connected agent-managers (called by frontend).
  rpc RequestWorktreeList(RequestWorktreeListRequest) returns (RequestWorktreeListResponse);
  // GetWorktreeList returns the cached worktree list for a project.
  rpc GetWorktreeList(GetWorktreeListRequest) returns (GetWorktreeListResponse);
  // RequestWorktreeDelete initiates deletion of a specific worktree (called by frontend).
  rpc RequestWorktreeDelete(RequestWorktreeDeleteRequest) returns (RequestWorktreeDeleteResponse);
  // ReportWorktreeDeleteResult reports the outcome of a worktree deletion from the agent.
  rpc ReportWorktreeDeleteResult(ReportWorktreeDeleteResultRequest) returns (ReportWorktreeDeleteResultResponse);
  // RequestGitPullMain triggers a `git pull origin main` on connected agent-managers (called by frontend).
  rpc RequestGitPullMain(RequestGitPullMainRequest) returns (RequestGitPullMainResponse);
  // ReportGitPullMainResult reports the outcome of a git pull origin main from the agent.
  rpc ReportGitPullMainResult(ReportGitPullMainResultRequest) returns (ReportGitPullMainResultResponse);
  // SyncScripts returns all script definitions for a project so the agent can
  // write them as .claude/scripts/* files locally.
  rpc SyncScripts(SyncScriptsRequest) returns (SyncScriptsResponse);
  // ReportScriptExecutionResult reports the outcome of a script execution from the agent.
  rpc ReportScriptExecutionResult(ReportScriptExecutionResultRequest) returns (ReportScriptExecutionResultResponse);
  // ReportScriptOutputChunk reports a chunk of real-time script output from the agent.
  rpc ReportScriptOutputChunk(ReportScriptOutputChunkRequest) returns (ReportScriptOutputChunkResponse);
  // RequestScriptComparison triggers a script comparison on connected agent-managers (called by frontend).
  rpc RequestScriptComparison(RequestScriptComparisonRequest) returns (RequestScriptComparisonResponse);
  // ReportScriptComparison reports script diffs from the agent-manager after comparison.
  rpc ReportScriptComparison(ReportScriptComparisonRequest) returns (ReportScriptComparisonResponse);
  // GetScriptComparison returns the cached script comparison result for a project.
  rpc GetScriptComparison(GetScriptComparisonRequest) returns (GetScriptComparisonResponse);
  // ResolveScriptConflict resolves a per-script conflict between server and agent versions.
  rpc ResolveScriptConflict(ResolveScriptConflictRequest) returns (ResolveScriptConflictResponse);
  // RequestAgentComparison triggers an agent comparison on connected agent-managers (called by frontend).
  rpc RequestAgentComparison(RequestAgentComparisonRequest) returns (RequestAgentComparisonResponse);
  // ReportAgentComparison reports agent diffs from the agent-manager after comparison.
  rpc ReportAgentComparison(ReportAgentComparisonRequest) returns (ReportAgentComparisonResponse);
  // GetAgentComparison returns the cached agent comparison result for a project.
  rpc GetAgentComparison(GetAgentComparisonRequest) returns (GetAgentComparisonResponse);
  // ResolveAgentConflict resolves a single agent conflict between server and agent versions.
  rpc ResolveAgentConflict(ResolveAgentConflictRequest) returns (ResolveAgentConflictResponse);
  // ListSingleCommandPermissions returns all regex-based single-command permission
  // rules for a project (used by agents to populate their cache).
  rpc ListSingleCommandPermissions(ListSingleCommandPermissionsAgentRequest) returns (ListSingleCommandPermissionsAgentResponse);
  // AddSingleCommandPermission adds a new regex permission rule from an agent.
  rpc AddSingleCommandPermission(AddSingleCommandPermissionRequest) returns (AddSingleCommandPermissionResponse);
  // SyncSkills returns all skill definitions for a project so the agent can
  // write them as .claude/skills/{name}/SKILL.md files locally.
  rpc SyncSkills(SyncSkillsRequest) returns (SyncSkillsResponse);
  // RequestSkillComparison triggers a skill comparison on connected agent-managers (called by frontend).
  rpc RequestSkillComparison(RequestSkillComparisonRequest) returns (RequestSkillComparisonResponse);
  // ReportSkillComparison reports skill diffs from the agent-manager after comparison.
  rpc ReportSkillComparison(ReportSkillComparisonRequest) returns (ReportSkillComparisonResponse);
  // GetSkillComparison returns the cached skill comparison result for a project.
  rpc GetSkillComparison(GetSkillComparisonRequest) returns (GetSkillComparisonResponse);
  // ResolveSkillConflict resolves a single skill conflict between server and agent versions.
  rpc ResolveSkillConflict(ResolveSkillConflictRequest) returns (ResolveSkillConflictResponse);
}

// --- Subscribe stream ---

message AgentManagerSubscribeRequest {
  string agent_manager_id = 1;
  string project_name = 2;
  int32 max_concurrent_tasks = 3;
  // active_task_ids is the list of tasks currently running on this agent.
  // On reconnection, the server will NOT release these tasks (they are still
  // being executed locally). Tasks assigned to this agent but NOT in this list
  // are released and re-broadcast.
  repeated string active_task_ids = 4;
  // agent_version is the git commit hash (short) of the agent binary.
  // The server uses this to detect version mismatches and log warnings.
  string agent_version = 5;
}

message AgentCommand {
  oneof command {
    TaskAvailableCommand task_available = 1;
    AssignTaskCommand assign_task = 2;
    CancelTaskCommand cancel_task = 3;
    InteractionResponseCommand interaction_response = 4;
    SyncAgentsCommand sync_agents = 5;
    SyncPermissionsCommand sync_permissions = 6;
    ListWorktreesCommand list_worktrees = 7;
    DeleteWorktreeCommand delete_worktree = 8;
    GitPullMainCommand git_pull_main = 9;
    SyncScriptsCommand sync_scripts = 10;
    ExecuteScriptCommand execute_script = 11;
    // Ping is a keepalive message sent periodically by the server to prevent
    // idle stream timeouts from HTTP/2 intermediaries or OS-level TCP settings.
    PingCommand ping = 12;
    CompareScriptsCommand compare_scripts = 13;
    // StopScriptCommand tells the agent to stop a running script execution.
    StopScriptCommand stop_script = 14;
    // CompareAgentsCommand tells the agent to compare its local .claude/agents/*.md
    // files with server-side versions and report any differences.
    CompareAgentsCommand compare_agents = 15;
    // SyncSkillsCommand tells the agent to re-sync its local .claude/skills/ files.
    SyncSkillsCommand sync_skills = 16;
    // CompareSkillsCommand tells the agent to compare its local .claude/skills/
    // files with server-side versions and report any differences.
    CompareSkillsCommand compare_skills = 17;
  }
}

// PingCommand is a keepalive message. The client should silently ignore it.
message PingCommand {}

// --- Commands ---

message TaskAvailableCommand {
  string task_id = 1;
  string title = 2;
  string agent_config_id = 3;
  map<string, string> metadata = 4;
}

message AssignTaskCommand {
  string task_id = 1;
  string agent_config_id = 2;
  string instructions = 3;
  string worktree_branch = 4;
  map<string, string> metadata = 5;
}

message CancelTaskCommand {
  string task_id = 1;
  string reason = 2;
}

message InteractionResponseCommand {
  string interaction_id = 1;
  string response = 2;
}

// SyncAgentsCommand tells the agent to re-sync its local .claude/agents/*.md files.
// When force_overwrite_agent_names is non-empty, those agents should be overwritten
// on the agent even if the local file already exists.
message SyncAgentsCommand {
  repeated string force_overwrite_agent_names = 1;
}

// SyncPermissionsCommand tells the agent to re-sync its local
// .claude/settings.json permissions section.
message SyncPermissionsCommand {}

// ListWorktreesCommand requests the agent-manager to scan and report
// available git worktrees in its working directory.
message ListWorktreesCommand {
  string request_id = 1;
}

// --- Task lifecycle ---

message ClaimTaskRequest {
  string task_id = 1;
  string agent_manager_id = 2;
}
message ClaimTaskResponse {
  bool success = 1;
  string agent_config_id = 2;
  string instructions = 3;
  map<string, string> metadata = 4;
}

message ReportTaskResultRequest {
  string task_id = 1;
  reserved 2;
  reserved "status";
  string summary = 3;
  string error_message = 4;
}
message ReportTaskResultResponse {}

// --- Agent status ---

enum AgentStatus {
  AGENT_STATUS_UNSPECIFIED = 0;
  AGENT_STATUS_IDLE = 1;
  AGENT_STATUS_RUNNING = 2;
  AGENT_STATUS_WAITING = 3;
  AGENT_STATUS_ERROR = 4;
}

message ReportAgentStatusRequest {
  string agent_manager_id = 1;
  string task_id = 2;
  AgentStatus status = 3;
  string message = 4;
}
message ReportAgentStatusResponse {}

// --- Heartbeat ---

message HeartbeatRequest {
  string agent_manager_id = 1;
  int32 active_tasks = 2;
  google.protobuf.Timestamp timestamp = 3;
}
message HeartbeatResponse {}

// --- Interactions ---

message CreateInteractionRequest {
  string task_id = 1;
  string agent_id = 2;
  InteractionType type = 3;
  string title = 4;
  string description = 5;
  repeated InteractionOption options = 6;
  string metadata = 7;  // Optional JSON metadata (e.g. parsed Bash commands)
}
message CreateInteractionResponse {
  Interaction interaction = 1;
}

message GetInteractionResponseRequest {
  string interaction_id = 1;
}
message GetInteractionResponseResponse {
  Interaction interaction = 1;
}

// --- Agent sync ---

message SyncAgentsRequest {
  string project_name = 1;
}
message SyncAgentsResponse {
  repeated AgentDefinition agents = 1;
}

// --- Permission sync ---

message SyncPermissionsRequest {
  string project_name = 1;
  repeated string local_allow = 2;
  repeated string local_ask = 3;
  repeated string local_deny = 4;
}
message SyncPermissionsResponse {
  PermissionSet permissions = 1;
}

// --- Task logs ---

message ReportTaskLogRequest {
  string task_id = 1;
  TaskLogLevel level = 2;
  TaskLogCategory category = 3;
  string message = 4;
  map<string, string> metadata = 5;
}
message ReportTaskLogResponse {}

// --- Worktree management ---

message WorktreeInfo {
  string name = 1;      // worktree directory name (e.g., "y3cfp6_agent")
  string branch = 2;    // git branch name (e.g., "worktree-y3cfp6_agent")
  string task_id = 3;   // associated task ID if known
  bool has_changes = 4;              // true if worktree has uncommitted changes
  repeated string changed_files = 5; // list of changed file paths (relative to worktree root)
}

// DeleteWorktreeCommand tells the agent to remove a git worktree and its branch.
message DeleteWorktreeCommand {
  string request_id = 1;
  string worktree_name = 2;  // directory name under .claude/worktrees/
  bool force = 3;            // if true, delete even when uncommitted changes exist
}

message ReportWorktreeListRequest {
  string request_id = 1;
  string project_name = 2;
  repeated WorktreeInfo worktrees = 3;
}
message ReportWorktreeListResponse {}

message RequestWorktreeListRequest {
  string project_id = 1;
}
message RequestWorktreeListResponse {
  string request_id = 1;
}

message GetWorktreeListRequest {
  string project_id = 1;
}
message GetWorktreeListResponse {
  repeated WorktreeInfo worktrees = 1;
}

message RequestWorktreeDeleteRequest {
  string project_id = 1;
  string worktree_name = 2;
  bool force = 3;
}
message RequestWorktreeDeleteResponse {
  string request_id = 1;
}

message ReportWorktreeDeleteResultRequest {
  string request_id = 1;
  string project_name = 2;
  string worktree_name = 3;
  bool success = 4;
  string error_message = 5;
}
message ReportWorktreeDeleteResultResponse {}

// --- Git pull main ---

// GitPullMainCommand tells the agent to run `git pull origin main`
// in the main repository working directory.
message GitPullMainCommand {
  string request_id = 1;
}

message RequestGitPullMainRequest {
  string project_id = 1;
}
message RequestGitPullMainResponse {
  string request_id = 1;
}

message ReportGitPullMainResultRequest {
  string request_id = 1;
  string project_name = 2;
  bool success = 3;
  string output = 4;         // stdout/stderr from git pull
  string error_message = 5;  // error description if failed
}
message ReportGitPullMainResultResponse {}

// --- Script sync & execution ---

// SyncScriptsCommand tells the agent to re-sync its local .claude/scripts/* files.
// When force_overwrite_script_ids is non-empty, those scripts should be overwritten
// on the agent even if the local file already exists.
message SyncScriptsCommand {
  repeated string force_overwrite_script_ids = 1;
}

// CompareScriptsCommand tells the agent to compare its local .claude/scripts/*
// files with server-side versions and report any differences.
message CompareScriptsCommand {
  string request_id = 1;
  repeated ScriptDefinition scripts = 2;  // all server-side scripts for comparison
}

// ExecuteScriptCommand tells the agent to execute a specific script.
// The agent reads the script from the local .claude/scripts/{filename} file.
message ExecuteScriptCommand {
  string request_id = 1;
  string script_id = 2;
  string filename = 3;    // script filename (e.g. deploy.sh)
  string content = 4;     // deprecated: no longer sent; kept for backward compatibility
}

message SyncScriptsRequest {
  string project_name = 1;
}
message SyncScriptsResponse {
  repeated ScriptDefinition scripts = 1;
}

message ReportScriptExecutionResultRequest {
  string request_id = 1;
  string project_name = 2;
  string script_id = 3;
  bool success = 4;           // true if exit code == 0
  int32 exit_code = 5;
  reserved 6, 7;
  reserved "stdout", "stderr";
  string error_message = 8;   // error description if execution failed to start
  repeated ScriptLogEntry log_entries = 9;  // full interleaved log
  bool stopped_by_user = 10;  // true if stopped by user request
}
message ReportScriptExecutionResultResponse {}

// ReportScriptOutputChunk reports a chunk of real-time script output.
message ReportScriptOutputChunkRequest {
  string request_id = 1;
  string project_name = 2;
  reserved 3, 4;
  reserved "stdout_chunk", "stderr_chunk";
  repeated ScriptLogEntry entries = 5;  // interleaved log entries
}
message ReportScriptOutputChunkResponse {}

// StopScriptCommand tells the agent to stop a running script execution.
message StopScriptCommand {
  string request_id = 1;
}

// --- Script comparison & conflict resolution ---

enum ScriptDiffType {
  SCRIPT_DIFF_TYPE_UNSPECIFIED = 0;
  SCRIPT_DIFF_TYPE_MODIFIED = 1;      // both exist but content differs
  SCRIPT_DIFF_TYPE_AGENT_ONLY = 2;    // exists on agent but not on server
  SCRIPT_DIFF_TYPE_SERVER_ONLY = 3;   // exists on server but not on agent
}

message ScriptDiff {
  string script_id = 1;         // empty if agent-only script
  string script_name = 2;
  string filename = 3;
  string server_content = 4;
  string agent_content = 5;
  ScriptDiffType diff_type = 6;
}

enum ScriptResolutionChoice {
  SCRIPT_RESOLUTION_CHOICE_UNSPECIFIED = 0;
  SCRIPT_RESOLUTION_CHOICE_SERVER = 1;
  SCRIPT_RESOLUTION_CHOICE_AGENT = 2;
}

// RequestScriptComparison triggers a comparison on connected agents (called by frontend).
message RequestScriptComparisonRequest {
  string project_id = 1;
}
message RequestScriptComparisonResponse {
  string request_id = 1;
}

// ReportScriptComparison is sent by the agent after comparing local scripts with server versions.
message ReportScriptComparisonRequest {
  string request_id = 1;
  string project_name = 2;
  repeated ScriptDiff diffs = 3;
}
message ReportScriptComparisonResponse {}

// GetScriptComparison returns the cached comparison result for a project.
message GetScriptComparisonRequest {
  string project_id = 1;
}
message GetScriptComparisonResponse {
  repeated ScriptDiff diffs = 1;
}

// ResolveScriptConflict resolves a single script conflict between server and agent.
message ResolveScriptConflictRequest {
  string project_id = 1;
  string script_id = 2;          // empty if agent-only (will create new)
  string script_name = 3;
  string filename = 4;
  ScriptResolutionChoice choice = 5;
  string agent_content = 6;      // only needed when choice = AGENT
}
message ResolveScriptConflictResponse {
  ScriptDefinition script = 1;   // the resulting script after resolution
}

// --- Agent comparison & conflict resolution ---

// CompareAgentsCommand tells the agent to compare its local .claude/agents/*.md
// files with server-side versions and report any differences.
message CompareAgentsCommand {
  string request_id = 1;
  repeated AgentDefinition agents = 2;  // all server-side agents for comparison
}

enum AgentDiffType {
  AGENT_DIFF_TYPE_UNSPECIFIED = 0;
  AGENT_DIFF_TYPE_MODIFIED = 1;      // both exist but content differs
  AGENT_DIFF_TYPE_AGENT_ONLY = 2;    // exists on agent but not on server
  AGENT_DIFF_TYPE_SERVER_ONLY = 3;   // exists on server but not on agent
}

message AgentDiff {
  string agent_id = 1;         // empty if agent-only
  string agent_name = 2;
  string filename = 3;
  string server_content = 4;
  string agent_content = 5;
  AgentDiffType diff_type = 6;
}

enum AgentResolutionChoice {
  AGENT_RESOLUTION_CHOICE_UNSPECIFIED = 0;
  AGENT_RESOLUTION_CHOICE_SERVER = 1;   // overwrite local with server version
  AGENT_RESOLUTION_CHOICE_AGENT = 2;    // keep local and update server
}

// RequestAgentComparison triggers a comparison on connected agents (called by frontend).
message RequestAgentComparisonRequest {
  string project_id = 1;
}
message RequestAgentComparisonResponse {
  string request_id = 1;
}

// ReportAgentComparison is sent by the agent after comparing local agents with server versions.
message ReportAgentComparisonRequest {
  string request_id = 1;
  string project_name = 2;
  repeated AgentDiff diffs = 3;
}
message ReportAgentComparisonResponse {}

// GetAgentComparison returns the cached comparison result for a project.
message GetAgentComparisonRequest {
  string project_id = 1;
}
message GetAgentComparisonResponse {
  repeated AgentDiff diffs = 1;
}

// ResolveAgentConflict resolves a single agent conflict between server and agent.
message ResolveAgentConflictRequest {
  string project_id = 1;
  string agent_id = 2;            // empty if agent-only (will create new)
  string agent_name = 3;
  string filename = 4;
  AgentResolutionChoice choice = 5;
  string agent_content = 6;       // only needed when choice = AGENT
}
message ResolveAgentConflictResponse {
  AgentDefinition agent = 1;      // the resulting agent after resolution
}

// --- Skill sync & comparison ---

// SyncSkillsCommand tells the agent to re-sync its local .claude/skills/ files.
// When force_overwrite_skill_ids is non-empty, those skills should be overwritten
// on the agent even if the local file already exists.
message SyncSkillsCommand {
  repeated string force_overwrite_skill_ids = 1;
}

// CompareSkillsCommand tells the agent to compare its local .claude/skills/
// files with server-side versions and report any differences.
message CompareSkillsCommand {
  string request_id = 1;
  repeated SkillDefinition skills = 2;  // all server-side skills for comparison
}

message SyncSkillsRequest {
  string project_name = 1;
}
message SyncSkillsResponse {
  repeated SkillDefinition skills = 1;
}

enum SkillDiffType {
  SKILL_DIFF_TYPE_UNSPECIFIED = 0;
  SKILL_DIFF_TYPE_MODIFIED = 1;      // both exist but content differs
  SKILL_DIFF_TYPE_AGENT_ONLY = 2;    // exists on agent but not on server
  SKILL_DIFF_TYPE_SERVER_ONLY = 3;   // exists on server but not on agent
}

message SkillDiff {
  string skill_id = 1;         // empty if agent-only skill
  string skill_name = 2;
  string filename = 3;         // relative path (e.g. "my-skill/SKILL.md")
  string server_content = 4;
  string agent_content = 5;
  SkillDiffType diff_type = 6;
}

enum SkillResolutionChoice {
  SKILL_RESOLUTION_CHOICE_UNSPECIFIED = 0;
  SKILL_RESOLUTION_CHOICE_SERVER = 1;   // overwrite local with server version
  SKILL_RESOLUTION_CHOICE_AGENT = 2;    // keep local and update server
}

// RequestSkillComparison triggers a comparison on connected agents (called by frontend).
message RequestSkillComparisonRequest {
  string project_id = 1;
}
message RequestSkillComparisonResponse {
  string request_id = 1;
}

// ReportSkillComparison is sent by the agent after comparing local skills with server versions.
message ReportSkillComparisonRequest {
  string request_id = 1;
  string project_name = 2;
  repeated SkillDiff diffs = 3;
}
message ReportSkillComparisonResponse {}

// GetSkillComparison returns the cached comparison result for a project.
message GetSkillComparisonRequest {
  string project_id = 1;
}
message GetSkillComparisonResponse {
  repeated SkillDiff diffs = 1;
}

// ResolveSkillConflict resolves a single skill conflict between server and agent.
message ResolveSkillConflictRequest {
  string project_id = 1;
  string skill_id = 2;          // empty if agent-only (will create new)
  string skill_name = 3;
  string filename = 4;
  SkillResolutionChoice choice = 5;
  string agent_content = 6;      // only needed when choice = AGENT
}
message ResolveSkillConflictResponse {
  SkillDefinition skill = 1;   // the resulting skill after resolution
}

// --- Single Command Permissions ---

message ListSingleCommandPermissionsAgentRequest {
  string project_name = 1;
}
message ListSingleCommandPermissionsAgentResponse {
  repeated SingleCommandPermission permissions = 1;
}

message AddSingleCommandPermissionRequest {
  string project_name = 1;
  string pattern = 2;
  string type = 3;   // "command" or "redirect"
  string label = 4;
}
message AddSingleCommandPermissionResponse {
  SingleCommandPermission permission = 1;
}
